version: "3.8"

services:
  db:
    image: mariadb:10.6
    container_name: ipm_db
    restart: always
    environment:
      # KONFIGURASI DATABASE
      # Ganti password ini jika untuk server produksi sungguhan
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    build: .
    container_name: ipm_wordpress
    restart: always
    ports:
      # Port 8080 di laptop akan diarahkan ke port 80 di container
      # Buka website menggunakan: http://localhost:8080
      - "${WORDPRESS_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
    volumes:
      # Sinkronisasi folder lokal ini langsung ke dalam server container
      - .:/var/www/html
    depends_on:
      - db

# Volume persisten agar data database tabel tidak hilang saat container dimatikan
volumes:
  db_data:
