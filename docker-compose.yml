version: "3.8"

services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      # Allow empty password because wp-config.php uses empty password
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: "admin"
      MYSQL_PASSWORD: "password"
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    build: .
    restart: always
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: ${DB_HOST}:3306
      WORDPRESS_DB_USER: ${DB_USER}
      # Empty password mapped from .env
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
    volumes:
      - .:/var/www/html
    depends_on:
      - db

volumes:
  db_data:
